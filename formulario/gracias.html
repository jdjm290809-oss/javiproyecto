<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#fff8ee;
            font-family:Arial, Helvetica, sans-serif;
        }

        .mensaje{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
            width:400px;
        }

        h1{
            color:#6d4c41;
        }

        p{
            color:#8d6e63;
            font-size:18px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#c68642;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        a:hover{
            background:#8b5e34;
        }
    </style>

</head>

<body>

<div class="mensaje">

    <h1>🥖 ¡Gracias por tu opinión!</h1>

    <p>
        Hemos recibido tu mensaje correctamente.
        Tu opinión nos ayuda a mejorar nuestra panadería.
    </p>

    <a href="index.html">
        Volver al inicio
    </a>

</div>

</body>
</html>
